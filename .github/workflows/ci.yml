name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  go:
    name: go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - run: go test ./...
      - run: go vet ./...

  web:
    name: web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Test and build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_APP_VERSION: ci
          NEXT_PUBLIC_GIT_SHA: ci
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: |
          npm ci --no-audit --no-fund
          npm run test
          npm run build

  manifests:
    name: manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          KUSTOMIZE_VERSION="v5.5.0"
          curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" | tar -xz
          sudo mv kustomize /usr/local/bin/kustomize

      - name: Validate local k3d overlay
        run: kustomize build infra/k3s/overlays/k3d >/tmp/geoduels-k3d.yaml

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
