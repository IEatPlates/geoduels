apiVersion: apps/v1
kind: Deployment
metadata:
  name: match-coordinator
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: match-coordinator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: match-coordinator
        app.kubernetes.io/part-of: geoduels
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: match-coordinator
          image: ghcr.io/sourcelocation/geoduels-match-coordinator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
          envFrom:
            - configMapRef:
                name: geoduels-runtime-config
            - secretRef:
                name: geoduels-secrets
          env:
            - name: MATCH_COORDINATOR_ADDR
              value: :8090
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
