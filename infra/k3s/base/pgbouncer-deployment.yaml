apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pgbouncer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgbouncer
        app.kubernetes.io/part-of: geoduels
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: pgbouncer
          image: ghcr.io/cloudnative-pg/pgbouncer:1.24.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 6432
          envFrom:
            - secretRef:
                name: geoduels-secrets
          env:
            - name: PGBOUNCER_LISTEN_PORT
              value: "6432"
            - name: PGBOUNCER_POOL_MODE
              value: transaction
            - name: PGBOUNCER_DEFAULT_POOL_SIZE
              value: "20"
            - name: PGBOUNCER_RESERVE_POOL_SIZE
              value: "5"
            - name: PGBOUNCER_MAX_CLIENT_CONN
              value: "200"
            - name: PGBOUNCER_SERVER_RESET_QUERY
              value: DISCARD ALL
          command:
            - /bin/sh
            - -ec
          args:
            - |
              : "${PGBOUNCER_POSTGRES_HOST:?PGBOUNCER_POSTGRES_HOST is required}"
              : "${PGBOUNCER_POSTGRES_USER:?PGBOUNCER_POSTGRES_USER is required}"
              : "${PGBOUNCER_POSTGRES_PASSWORD:?PGBOUNCER_POSTGRES_PASSWORD is required}"
              : "${PGBOUNCER_POSTGRES_DB:=geoduels}"
              : "${PGBOUNCER_POSTGRES_PORT:=5432}"
              cat >/tmp/pgbouncer.ini <<EOF
              [databases]
              ${PGBOUNCER_POSTGRES_DB} = host=${PGBOUNCER_POSTGRES_HOST} port=${PGBOUNCER_POSTGRES_PORT} dbname=${PGBOUNCER_POSTGRES_DB} user=${PGBOUNCER_POSTGRES_USER} password=${PGBOUNCER_POSTGRES_PASSWORD}

              [pgbouncer]
              listen_addr = 0.0.0.0
              listen_port = ${PGBOUNCER_LISTEN_PORT}
              auth_type = any
              pool_mode = ${PGBOUNCER_POOL_MODE}
              max_client_conn = ${PGBOUNCER_MAX_CLIENT_CONN}
              default_pool_size = ${PGBOUNCER_DEFAULT_POOL_SIZE}
              reserve_pool_size = ${PGBOUNCER_RESERVE_POOL_SIZE}
              server_reset_query = ${PGBOUNCER_SERVER_RESET_QUERY}
              ignore_startup_parameters = extra_float_digits
              EOF
              exec pgbouncer /tmp/pgbouncer.ini
          readinessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
