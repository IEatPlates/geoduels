apiVersion: apps/v1
kind: Deployment
metadata:
  name: moderation-worker
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: moderation-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: moderation-worker
        app.kubernetes.io/part-of: geoduels
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: moderation-worker
          image: ghcr.io/sourcelocation/geoduels-moderation-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8093
          envFrom:
            - configMapRef:
                name: geoduels-runtime-config
            - secretRef:
                name: geoduels-secrets
          env:
            - name: MODERATION_WORKER_ADDR
              value: :8093
            - name: POSTGRES_URL
              value: postgres://geoduels:geoduels@pgbouncer:6432/geoduels?sslmode=disable
            - name: POSTGRES_PGBOUNCER
              value: "true"
            - name: POSTGRES_MAX_CONNS
              value: "2"
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
