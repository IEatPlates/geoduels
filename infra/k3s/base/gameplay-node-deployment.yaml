apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gameplay-node
spec:
  replicas: 1
  serviceName: gameplay-node-headless
  selector:
    matchLabels:
      app.kubernetes.io/name: gameplay-node
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gameplay-node
        app.kubernetes.io/part-of: geoduels
    spec:
      terminationGracePeriodSeconds: 960
      containers:
        - name: gameplay-node
          image: ghcr.io/sourcelocation/geoduels-gameplay-node:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8091
          envFrom:
            - configMapRef:
                name: geoduels-runtime-config
            - secretRef:
                name: geoduels-secrets
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: GAMEPLAY_NODE_ADDR
              value: :8091
            - name: GAMEPLAY_NODE_ID
              value: $(POD_NAME)
            - name: GAMEPLAY_PUBLIC_ROUTE
              value: $(POD_NAME)
            - name: GAMEPLAY_INTERNAL_URL
              value: http://$(POD_NAME).gameplay-node-headless.$(POD_NAMESPACE).svc.cluster.local:8091
            - name: GAMEPLAY_DRAIN_TIMEOUT
              value: 15m
            - name: POSTGRES_URL
              value: postgres://geoduels:geoduels@pgbouncer:6432/geoduels?sslmode=disable
            - name: POSTGRES_PGBOUNCER
              value: "true"
            - name: POSTGRES_MAX_CONNS
              value: "4"
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
