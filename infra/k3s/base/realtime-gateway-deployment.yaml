apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-gateway
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: realtime-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: realtime-gateway
        app.kubernetes.io/part-of: geoduels
    spec:
      terminationGracePeriodSeconds: 1140
      containers:
        - name: realtime-gateway
          image: ghcr.io/sourcelocation/geoduels-realtime-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8092
          envFrom:
            - configMapRef:
                name: geoduels-runtime-config
            - secretRef:
                name: geoduels-secrets
          env:
            - name: REALTIME_GATEWAY_ADDR
              value: :8092
            - name: REALTIME_GATEWAY_DRAIN_TIMEOUT
              value: 18m
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
