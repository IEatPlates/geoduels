apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: geoduels
spec:
  ingressClassName: traefik
  rules:
    - host: localhost
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
          - path: /queue
            pathType: Prefix
            backend:
              service:
                name: match-coordinator
                port:
                  number: 8090
          - path: /lobbies
            pathType: Prefix
            backend:
              service:
                name: match-coordinator
                port:
                  number: 8090
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: realtime-gateway
                port:
                  number: 8092
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
